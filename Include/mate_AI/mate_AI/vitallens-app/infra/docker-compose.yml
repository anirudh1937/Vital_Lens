services:
  api:
    build: ../backend
    ports:
      - 8000:8000
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vitallens
      POSTGRES_PASSWORD: vitallens
      POSTGRES_DB: vitallens
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
volumes:
  pgdata:
